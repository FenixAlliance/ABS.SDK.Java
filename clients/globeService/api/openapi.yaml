    url: https://fenix-alliance.com.co/Legal/Policies/eula
  termsOfService: https://absuite.net/eula
  title: GlobeService
  version: 2.0.0.0
servers:
- description: Alliance Business Suite API
  url: "{server}"
  variables:
    server:
      default: https://absuite.net
      description: ABS instance base URL
      enum:
      - https://absuite.net
      - https://test.absuite.net
      - https://dev.absuite.net
      - https://localhost:44388
tags:
- name: Countries
- name: Currencies
- name: FenixAlliance.ABP.Web
- name: Languages
- name: Timezones
paths:
  /api/v2/GlobeService/Countries:
    get:
      description: Retrieves a list of all countries with optional OData pagination
        and filtering.
      operationId: GetAllCountries
      parameters:
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Forbidden
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Unauthorized
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryDtoListEnvelope'
          description: OK
      summary: Get all countries
      tags:
      - Countries
      x-accepts:
      - application/json
  /api/v2/GlobeService/Countries/Count:
    get:
      description: "Returns the total number of countries, with optional OData filtering."
