openapi: 3.0.4
info:
  contact:
    email: support@fenix-alliance.com
    name: Fenix Alliance Inc.
    url: https://fenixalliance.com.co/Support
  license:
    name: Fenix Alliance Inc.
    url: https://fenix-alliance.com.co/Legal/Policies/eula
  termsOfService: https://absuite.net/eula
  title: SystemService
  version: 2.0.0.0
servers:
- description: Alliance Business Suite API
  url: "{server}"
  variables:
    server:
      default: https://absuite.net
      description: ABS instance base URL
      enum:
      - https://absuite.net
      - https://test.absuite.net
      - https://dev.absuite.net
      - https://localhost:44388
tags:
- name: Antiforgery
- name: Emails
- name: FenixAlliance.ABP.Web
- name: Licensing
- name: Migrations
- name: Modules
- name: Options
- name: Tenants
- name: Users
paths:
  /api/v2/SystemService/Antiforgery/GetAndStoreTokens:
    get:
      description: Generates antiforgery tokens and stores them in the current HTTP
        context.
      operationId: GetAndStoreTokens
      parameters:
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: OK
      summary: Get and store antiforgery tokens
      tags:
      - Antiforgery
      x-accepts:
      - application/json
  /api/v2/SystemService/Antiforgery/IsRequestValid:
    get:
      description: Validates whether the current HTTP request contains a valid antiforgery
        token.
      operationId: IsRequestValidAsync
      parameters:
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: OK
      summary: Validate antiforgery request
      tags:
      - Antiforgery
      x-accepts:
      - application/json
  /api/v2/SystemService/Emails/SendBasic:
    post:
      description: This action is only available for global administrators (business_owner
        role).
      operationId: AdminSendBasicEmail
      parameters:
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectEmailDispatchRequest'
          application/xml:
            schema:
              $ref: '#/components/schemas/ObjectEmailDispatchRequest'
      responses:
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Forbidden
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Unauthorized
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDtoListEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/TenantDtoListEnvelope'
          description: OK
      summary: Send a basic transactional email to recipients.
      tags:
      - Emails
      x-content-type: application/json
      x-accepts:
      - application/json
      - application/xml
  /api/v2/SystemService/Emails/Preview:
    post:
      description: This action is only available for global administrators (business_owner
