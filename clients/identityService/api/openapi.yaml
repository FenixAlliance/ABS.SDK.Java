openapi: 3.0.4
info:
  contact:
    email: support@fenix-alliance.com
    name: Fenix Alliance Inc.
    url: https://fenixalliance.com.co/Support
  license:
    name: Fenix Alliance Inc.
    url: https://fenix-alliance.com.co/Legal/Policies/eula
  termsOfService: https://absuite.net/eula
  title: IdentityService
  version: 2.0.0.0
servers:
- description: Alliance Business Suite API
  url: "{server}"
  variables:
    server:
      default: https://absuite.net
      description: ABS instance base URL
      enum:
      - https://absuite.net
      - https://test.absuite.net
      - https://dev.absuite.net
      - https://localhost:44388
tags:
- name: Applications
- name: Checker
- name: FenixAlliance.ABS.Web
- name: OAuth
- name: Resource
- name: UserInfo
paths:
  /api/v2/Applications/{appId}:
    get:
      description: Retrieves an application by its unique identifier.
      operationId: GetApplication
      parameters:
      - explode: false
        in: path
        name: appId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: OK
      summary: Get application by ID
      tags:
      - Applications
      x-accepts:
      - application/json
  /api/v2/Applications/{appId}/RequiredPermissions:
    get:
      description: Retrieves the list of permissions required by the specified application.
      operationId: GetRequiredPermissions
      parameters:
      - explode: false
        in: path
        name: appId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: OK
      summary: Get required permissions for an application
      tags:
      - Applications
      x-accepts:
      - application/json
  /api/v2/Applications/{appId}/GrantedPermissions:
    get:
      description: Retrieves the list of permissions granted to the specified application
        within a tenant context.
      operationId: GetGrantedTenantPermissions
      parameters:
      - explode: false
        in: path
        name: appId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: tenantId
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: OK
      summary: Get granted tenant permissions for an application
      tags:
      - Applications
      x-accepts:
      - application/json
  /api/v2/Applications/{appId}/GrantedRoles:
    get:
      description: Retrieves the list of security roles granted to the specified application
        within a tenant context.
      operationId: GetGrantedTenantRoles
      parameters:
      - explode: false
        in: path
        name: appId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: tenantId
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: OK
      summary: Get granted tenant roles for an application
      tags:
      - Applications
      x-accepts:
      - application/json
  /api/v2/Applications/{appId}/GrantedRoles/{securityRoleId}/GrantedPermissions:
    get:
      description: Retrieves the list of permissions granted through a specific security
        role for the specified application.
      operationId: GetGrantedEnrollmentPermissions
      parameters:
      - explode: false
        in: path
        name: appId
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: path
        name: securityRoleId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: enrollmentId
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: OK
      summary: Get granted permissions for an application role
      tags:
      - Applications
      x-accepts:
      - application/json
  /api/v2/Auth/Checker/IsAuthenticated:
    get:
      description: Returns whether the current user is authenticated.
      operationId: IsAuthenticated
      parameters:
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                type: boolean
            application/xml:
              schema:
                type: boolean
          description: OK
      summary: Check if user is authenticated
      tags:
      - Checker
      x-accepts:
      - application/json
      - application/xml
  /version:
    get:
      responses:
        "200":
          description: OK
      tags:
      - FenixAlliance.ABS.Web
      x-accepts:
      - application/json
  /health:
    get:
      responses:
        "200":
          description: OK
      tags:
      - FenixAlliance.ABS.Web
      x-accepts:
      - application/json
  /hello:
    get:
      responses:
        "200":
          description: OK
      tags:
      - FenixAlliance.ABS.Web
      x-accepts:
      - application/json
  /register:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        "200":
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/HttpValidationProblemDetails'
          description: Bad Request
      tags:
      - FenixAlliance.ABS.Web
      x-content-type: application/json
      x-accepts:
      - application/problem+json
  /login:
    post:
      parameters:
      - explode: true
        in: query
        name: useCookies
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: useSessionCookies
        required: false
        schema:
          type: boolean
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponse'
          description: OK
      tags:
      - FenixAlliance.ABS.Web
      x-content-type: application/json
      x-accepts:
      - application/json
  /refresh:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponse'
          description: OK
      tags:
      - FenixAlliance.ABS.Web
      x-content-type: application/json
      x-accepts:
      - application/json
  /confirmEmail:
    get:
      operationId: MapIdentityApi-/confirmEmail
      parameters:
      - explode: true
        in: query
        name: userId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: code
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: changedEmail
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          description: OK
      tags:
      - FenixAlliance.ABS.Web
      x-accepts:
      - application/json
  /resendConfirmationEmail:
    post:
      requestBody:
        content:
          application/json:
