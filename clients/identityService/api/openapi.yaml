      responses:
        "200":
          description: OK
      tags:
      - FenixAlliance.ABS.Web
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /Account/Manage/DownloadPersonalData:
    post:
      responses:
        "200":
          description: OK
      tags:
      - FenixAlliance.ABS.Web
      x-accepts:
      - application/json
  /api/v2/OAuth/WhoAmI:
    get:
      description: "Returns the authorization result for the authenticated user, including\
        \ identity and tenant context."
      operationId: Get
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationResultEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/AuthorizationResultEnvelope'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Forbidden
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Unauthorized
      summary: Get current user identity
      tags:
      - OAuth
      x-accepts:
      - application/json
      - application/xml
  /api/v2/OAuth/Token:
    post:
      description: Generates an OAuth token based on the provided credentials or grant
        type.
      operationId: Token
      parameters:
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
          application/xml:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonWebTokenEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/JsonWebTokenEnvelope'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Forbidden
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Unauthorized
      summary: Get OAuth token
      tags:
      - OAuth
      x-content-type: application/json
      x-accepts:
      - application/json
      - application/xml
  /api/v2/OAuth/Permissions:
    get:
      description: Retrieves the list of permission identifiers for a specific user
        within a tenant context.
      operationId: GetPermissions
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: true
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: userId
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
