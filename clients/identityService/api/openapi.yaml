              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Unauthorized
      summary: Check password sign-in
      tags:
      - OAuth
      x-accepts:
      - application/json
      - application/xml
    post:
      description: Authenticates a user using email and password credentials.
      operationId: PasswordSignInAsync
      parameters:
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SigninModel'
          application/xml:
            schema:
              $ref: '#/components/schemas/SigninModel'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonWebTokenEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/JsonWebTokenEnvelope'
