        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringListEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/StringListEnvelope'
          description: OK
        "403":
