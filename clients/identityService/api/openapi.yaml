            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Unauthorized
      summary: Sign in with password
      tags:
      - OAuth
      x-content-type: application/json
      x-accepts:
      - application/json
      - application/xml
  /api/v2/OAuth/{applicationId}/Keys:
