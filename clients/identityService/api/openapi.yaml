          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/HttpValidationProblemDetails'
          description: Bad Request
        "404":
          description: Not Found
      tags:
      - FenixAlliance.ABS.Web
      x-content-type: application/json
      x-accepts:
      - application/json
      - application/problem+json
  /manage/info:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/HttpValidationProblemDetails'
          description: Bad Request
        "404":
          description: Not Found
      tags:
      - FenixAlliance.ABS.Web
      x-accepts:
      - application/json
      - application/problem+json
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InfoRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/HttpValidationProblemDetails'
          description: Bad Request
        "404":
          description: Not Found
      tags:
      - FenixAlliance.ABS.Web
      x-content-type: application/json
      x-accepts:
      - application/json
      - application/problem+json
  /Account/PerformExternalLogin:
    post:
      requestBody:
        content:
          multipart/form-data:
            encoding:
              provider:
                style: form
              returnUrl:
                style: form
            schema:
              $ref: '#/components/schemas/_Account_PerformExternalLogin_post_request'
          application/x-www-form-urlencoded:
            encoding:
              provider:
                style: form
              returnUrl:
                style: form
            schema:
              $ref: '#/components/schemas/_Account_PerformExternalLogin_post_request'
      responses:
        "200":
          description: OK
      tags:
      - FenixAlliance.ABS.Web
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /Account/Logout:
    post:
      requestBody:
        content:
          multipart/form-data:
            encoding:
              returnUrl:
                style: form
            schema:
              $ref: '#/components/schemas/_Account_Logout_post_request'
          application/x-www-form-urlencoded:
            encoding:
              returnUrl:
                style: form
            schema:
              $ref: '#/components/schemas/_Account_Logout_post_request'
      responses:
        "200":
          description: OK
      tags:
      - FenixAlliance.ABS.Web
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /Account/Manage/LinkExternalLogin:
    post:
      requestBody:
        content:
          multipart/form-data:
            encoding:
              provider:
                style: form
            schema:
              $ref: '#/components/schemas/_Account_Manage_LinkExternalLogin_post_request'
          application/x-www-form-urlencoded:
            encoding:
              provider:
                style: form
            schema:
