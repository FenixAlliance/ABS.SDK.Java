              schema:
                $ref: '#/components/schemas/ContactDtoListEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ContactDtoListEnvelope'
          description: OK
      summary: Get all stock-related contacts
      tags:
      - Stock
      x-accepts:
      - application/json
      - application/xml
