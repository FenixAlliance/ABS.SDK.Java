  /api/v2/DealsService/DealUnitFlows:
    get:
      description: Retrieves a list of deal unit flows for the specified tenant with
        OData query support.
      operationId: GetDealUnitFlowsAsync
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: true
        schema:
          format: uuid
          type: string
        style: form
      responses:
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Not Found
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealUnitFlowDtoListEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/DealUnitFlowDtoListEnvelope'
          description: OK
      summary: Get deal unit flows
      tags:
      - DealUnitFlows
      x-accepts:
      - application/json
      - application/xml
    post:
      description: Creates a new deal unit flow for the specified tenant.
      operationId: CreateDealUnitFlowAsync
      parameters:
      - explode: true
        in: query
        name: tenantId
        required: true
        schema:
          format: uuid
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DealUnitFlowCreateDto'
          application/xml:
            schema:
              $ref: '#/components/schemas/DealUnitFlowCreateDto'
      responses:
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Not Found
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
          description: OK
      summary: Create a deal unit flow
      tags:
      - DealUnitFlows
      x-content-type: application/json
      x-accepts:
      - application/json
      - application/xml
