          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteDtoListEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/QuoteDtoListEnvelope'
          description: OK
      summary: Get a list of quotes.
      tags:
      - Quotes
      x-accepts:
      - application/json
      - application/xml
    post:
      description: Creates a new quote for the specified tenant.
      operationId: CreateQuote
