            application/xml:
              schema:
                $ref: '#/components/schemas/ForexRatesDtoEnvelope'
          description: OK
      summary: Get historical currency rates
      tags:
      - Rates
      x-accepts:
      - application/json
      - application/xml
  /api/v2/ForexService/Rates/History/{currencyId}:
    get:
      description: Retrieves the exchange rate for a specific currency as of a specific
        historical date.
      operationId: GetHistoricalCurrencyRateAsync
      parameters:
      - explode: false
        in: path
        name: currencyId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: date
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
