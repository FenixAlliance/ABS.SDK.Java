openapi: 3.0.4
info:
  contact:
    email: support@fenix-alliance.com
    name: Fenix Alliance Inc.
    url: https://fenixalliance.com.co/Support
  license:
    name: Fenix Alliance Inc.
    url: https://fenix-alliance.com.co/Legal/Policies/eula
  termsOfService: https://absuite.net/eula
  title: ForexService
  version: 2.0.0.0
servers:
- description: Alliance Business Suite API
  url: "{server}"
  variables:
    server:
      default: https://absuite.net
      description: ABS instance base URL
      enum:
      - https://absuite.net
      - https://test.absuite.net
      - https://dev.absuite.net
      - https://localhost:44388
tags:
- name: Exchange
- name: ExchangeV
- name: FenixAlliance.ABP.Web
- name: Rates
paths:
  /api/v2/ForexService/Exchange/Latest:
    get:
      description: Exchange an amount of money from one currency to another using
        the latest available exchange rates.
      operationId: ExchangeAmountAsync
      parameters:
      - explode: true
        in: query
        name: amount
        required: true
        schema:
          format: double
          type: number
        style: form
      - explode: true
        in: query
        name: sourceCurrencyId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: targetCurrencyId
        required: true
        schema:
          type: string
        style: form
      responses:
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Forbidden
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Unauthorized
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoneyEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/MoneyEnvelope'
          description: OK
      summary: Exchange currency at latest rates
      tags:
      - Exchange
      x-accepts:
      - application/json
      - application/xml
  /api/v2/ForexService/Exchange/History:
    get:
      description: Exchange an amount of money from one currency to another using
        exchange rates from a specific historical date.
      operationId: ExchangeAmountHistoricalAsync
      parameters:
      - explode: true
        in: query
        name: amount
        required: true
        schema:
          format: double
          type: number
        style: form
      - explode: true
        in: query
        name: sourceCurrencyId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: targetCurrencyId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: date
        required: true
        schema:
          format: date
          type: string
        style: form
      responses:
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Forbidden
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Unauthorized
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoneyEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/MoneyEnvelope'
          description: OK
      summary: Exchange currency at historical rates
      tags:
      - Exchange
      x-accepts:
      - application/json
      - application/xml
  /api/v3/ForexService/Exchange/Latest:
    get:
      description: Exchange an amount of money from one currency to another using
        the latest available exchange rates. Returns the full ExchangeRate details.
      operationId: ExchangeAmountV3Async
      parameters:
      - explode: true
        in: query
        name: amount
        required: true
        schema:
          format: double
          type: number
        style: form
      - explode: true
        in: query
        name: sourceCurrencyId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: targetCurrencyId
        required: true
        schema:
          type: string
        style: form
      responses:
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Forbidden
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Unauthorized
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExchangeRateEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ExchangeRateEnvelope'
          description: OK
      summary: Exchange currency at latest rates (v3)
      tags:
      - ExchangeV
      x-accepts:
      - application/json
      - application/xml
  /api/v3/ForexService/Exchange/History:
