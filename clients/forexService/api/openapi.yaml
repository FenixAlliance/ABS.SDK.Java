components:
  schemas:
    AccessTokenResponse:
      additionalProperties: false
      example:
        expiresIn: 0
        tokenType: tokenType
        accessToken: accessToken
        refreshToken: refreshToken
      properties:
        tokenType:
          nullable: true
          readOnly: true
          type: string
        accessToken:
          nullable: true
          type: string
        expiresIn:
          format: int64
          type: integer
        refreshToken:
          nullable: true
          type: string
      required:
      - accessToken
      - expiresIn
      - refreshToken
      type: object
    CurrencyId:
      additionalProperties: false
      example:
        country: country
        code: code
        value: value
      properties:
        value:
          nullable: true
          readOnly: true
          type: string
        code:
          nullable: true
          type: string
        country:
          nullable: true
          type: string
      type: object
    ErrorEnvelope:
      additionalProperties: false
      example:
        activityId: activityId
        errorMessage: errorMessage
        correlationId: correlationId
        isSuccess: true
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        isSuccess:
          readOnly: true
          type: boolean
        errorMessage:
          nullable: true
          type: string
        correlationId:
          nullable: true
          type: string
        timestamp:
          format: date-time
          readOnly: true
          type: string
        activityId:
          nullable: true
          readOnly: true
          type: string
      type: object
    ExchangeRate:
      additionalProperties: false
      example:
        rate:
          amount: 0.8008281904610115
          currency:
            country: country
            code: code
            value: value
        source:
          amount: 0.8008281904610115
          currency:
            country: country
            code: code
            value: value
        target:
          amount: 0.8008281904610115
          currency:
            country: country
            code: code
            value: value
      properties:
        source:
          $ref: '#/components/schemas/Money'
        target:
          $ref: '#/components/schemas/Money'
        rate:
          $ref: '#/components/schemas/Money'
      type: object
    ExchangeRateEnvelope:
      additionalProperties: false
      example:
        result:
          rate:
            amount: 0.8008281904610115
            currency:
              country: country
              code: code
              value: value
          source:
            amount: 0.8008281904610115
            currency:
              country: country
              code: code
              value: value
          target:
            amount: 0.8008281904610115
            currency:
              country: country
              code: code
              value: value
        activityId: activityId
        errorMessage: errorMessage
        correlationId: correlationId
        isSuccess: true
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        isSuccess:
          readOnly: true
          type: boolean
        errorMessage:
          nullable: true
          type: string
        correlationId:
          nullable: true
          type: string
        timestamp:
          format: date-time
          readOnly: true
          type: string
        activityId:
          nullable: true
          readOnly: true
          type: string
        result:
          $ref: '#/components/schemas/ExchangeRate'
      type: object
    ForexRatesDto:
      additionalProperties: false
      example:
        date: date
        requestTimestamp: 2000-01-23T04:56:07.000+00:00
        success: true
        rates:
          key: 6.027456183070403
        base: base
        timestamp: 0
      properties:
        success:
          type: boolean
        date:
          nullable: true
          type: string
        base:
          nullable: true
          type: string
        timestamp:
          format: int64
          type: integer
        requestTimestamp:
          format: date-time
          type: string
        rates:
          additionalProperties:
            format: double
            type: number
          nullable: true
          type: object
      type: object
    ForexRatesDtoEnvelope:
      additionalProperties: false
      example:
        result:
          date: date
          requestTimestamp: 2000-01-23T04:56:07.000+00:00
          success: true
          rates:
            key: 6.027456183070403
          base: base
          timestamp: 0
        activityId: activityId
        errorMessage: errorMessage
        correlationId: correlationId
        isSuccess: true
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        isSuccess:
          readOnly: true
          type: boolean
        errorMessage:
          nullable: true
          type: string
        correlationId:
          nullable: true
          type: string
        timestamp:
          format: date-time
          readOnly: true
          type: string
        activityId:
          nullable: true
          readOnly: true
          type: string
        result:
          $ref: '#/components/schemas/ForexRatesDto'
      type: object
    ForgotPasswordRequest:
      additionalProperties: false
      example:
        email: email
      properties:
        email:
          nullable: true
          type: string
      required:
      - email
      type: object
    HttpValidationProblemDetails:
      additionalProperties: {}
      properties:
        type:
          nullable: true
          type: string
        title:
          nullable: true
          type: string
        status:
          format: int32
          nullable: true
          type: integer
        detail:
          nullable: true
          type: string
        instance:
          nullable: true
          type: string
        errors:
          additionalProperties:
            items:
              type: string
            type: array
          nullable: true
          type: object
      type: object
    InfoRequest:
      additionalProperties: false
      example:
        oldPassword: oldPassword
        newPassword: newPassword
        newEmail: newEmail
      properties:
        newEmail:
          nullable: true
          type: string
        newPassword:
          nullable: true
          type: string
        oldPassword:
          nullable: true
          type: string
      type: object
    InfoResponse:
      additionalProperties: false
      example:
        email: email
        isEmailConfirmed: true
      properties:
        email:
