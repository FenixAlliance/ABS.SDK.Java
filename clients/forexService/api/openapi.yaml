          type: number
        style: form
      - explode: true
        in: query
        name: sourceCurrencyId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: targetCurrencyId
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: date
        required: true
        schema:
          format: date
          type: string
        style: form
      responses:
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Forbidden
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Unauthorized
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExchangeRateEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ExchangeRateEnvelope'
          description: OK
      summary: Exchange currency at historical rates (v3)
      tags:
      - ExchangeV
      x-accepts:
      - application/json
      - application/xml
