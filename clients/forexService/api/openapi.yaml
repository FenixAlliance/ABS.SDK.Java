      - application/problem+json
  /api/v2/ForexService/Rates/Latest:
    get:
      description: Retrieves the latest exchange rates for all supported currencies.
      operationId: GetLatestCurrencyRatesModelAsync
      parameters:
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Forbidden
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
          description: Unauthorized
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForexRatesDtoEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ForexRatesDtoEnvelope'
          description: OK
      summary: Get latest currency rates
      tags:
      - Rates
      x-accepts:
      - application/json
      - application/xml
  /api/v2/ForexService/Rates/Latest/{currencyId}:
    get:
      description: Retrieves the latest exchange rate for a specific currency by its
        identifier.
      operationId: GetLatestCurrencyRateAsync
      parameters:
      - explode: false
        in: path
        name: currencyId
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
      responses:
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
            application/xml:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
