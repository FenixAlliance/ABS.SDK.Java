      summary: Get latest rate for a currency
      tags:
      - Rates
      x-accepts:
      - application/json
      - application/xml
  /api/v2/ForexService/Rates/History:
    get:
      description: Retrieves exchange rates for all supported currencies as of a specific
        historical date.
      operationId: GetHistoricalCurrencyRatesAsync
      parameters:
      - explode: true
        in: query
        name: date
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: api-version
        required: false
        schema:
          type: string
        style: form
      - explode: false
        in: header
        name: x-api-version
        required: false
        schema:
          type: string
        style: simple
